<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Heidi ✨</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <h2>💜 For Heidi 💜</h2>
    <p>Enter password to continue</p>

    <input type="password" id="password" placeholder="Enter password">
    <button onclick="checkPassword()">Enter 💕</button>

    <p id="error"></p>
  </div>
</div>

<!-- 💜 LOADING SCREEN -->
<div id="loading-screen" style="display:none;">
  <div class="loader-box">
    <img src="loadingscreen.gif" alt="loading">
    <p>Loading our memories... 💜</p>
  </div>
</div>

<!-- 🌸 MAIN CONTENT -->
<div id="main-content" style="display:none;">

  <header>
    <h1>Our Story 💜</h1>
    <p>month by month</p>
  </header>

  <section class="timeline-wrapper">
    <button class="scroll-btn left" id="scrollLeft">◀</button>

    <div class="timeline">
      <a href="march.html" class="month"><h3>March</h3></a>
      <a href="april.html" class="month"><h3>April</h3></a>
      <a href="may.html" class="month"><h3>May</h3></a>
    </div>

    <button class="scroll-btn right" id="scrollRight">▶</button>
  </section>

  <section class="love-quiz">
    <h2>Do you love me?</h2>
    <button id="yes">Yes ❤️</button>
    <button id="no">No 💔</button>
  </section>

  <section class="countdown">
    <h2>Countdown to Our Special Day 💖</h2>
    <p>
      Next Meet-sary:
      <span id="meetsary-number"></span>
      <br>
      <span id="meetsary-timer"></span>
    </p>
  </section>

  <footer>
    <p>Ali 💕, Love 💜, Mahal 🤗</p>
  </footer>

</div>

<!-- Your main JS file -->
<script src="script.js"></script>

<!-- 🔐 LOGIN + LOADING LOGIC -->
<script>
window.onload = function () {

  // If user already logged in before
  if (localStorage.getItem("loggedIn") === "true") {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-content").style.display = "block";
  }

};

function checkPassword() {
  const pass = document.getElementById("password").value;

  if (pass === "heiro@0726") {

    // Save login status
    localStorage.setItem("loggedIn", "true");

    // Hide login
    document.getElementById("login-screen").style.display = "none";

    // Show loading
    document.getElementById("loading-screen").style.display = "flex";

    // Show main content after 2.5 seconds
    setTimeout(function () {
      document.getElementById("loading-screen").style.display = "none";
      document.getElementById("main-content").style.display = "block";
    }, 2500);

  } else {
    document.getElementById("error").innerText = "Wrong password 💔 Try again";
  }
}
</script>

</body>
</html>
