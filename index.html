<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Heidi ✨</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Our Story 💜</h1>
    <p>month by month</p>
  </header>

  <!-- Timeline Section -->
  <section class="timeline-wrapper">
    <button class="scroll-btn left" id="scrollLeft">◀</button>

    <div class="timeline">
      <a href="march.html" class="month">
        <h3>March</h3>
      </a>

      <a href="april.html" class="month">
        <h3>April</h3>
      </a>

      <a href="may.html" class="month">
        <h3>May</h3>
      </a>
    </div>

    <button class="scroll-btn right" id="scrollRight">▶</button>
  </section>

  <!-- Interactive Section -->
  <section class="love-quiz">
    <h2>Do you love me?</h2>
    <button id="yes">Yes ❤️</button>
    <button id="no">No 💔</button>
  </section>

<!-- Countdown Section -->
<section class="countdown">
  <h2>Countdown to Our Special Day 💖</h2>

  <div>
    <p>
      Next Meet-sary
      (<span id="meetsary-number"></span>):
      <span id="meetsary-timer"></span>
    </p>
  </div>
</section>

  <!-- Footer -->
  <footer>
    <p>Ali 💕, Love💜, Mahal🤗</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
